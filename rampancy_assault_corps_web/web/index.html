<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rampancy Assault Corps</title>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/assets/raclogo-white.svg">
  <link rel="preload" href="assets/fonts/WOFF2/KHInterferenceTRIAL-Light.woff2" as="font" type="font/woff2">
  <link rel="preload" href="assets/fonts/WOFF2/KHInterferenceTRIAL-Regular.woff2" as="font" type="font/woff2">
  <link rel="preload" href="assets/fonts/WOFF2/KHInterferenceTRIAL-Bold.woff2" as="font" type="font/woff2">

  <!-- Theme initialization - runs before page renders to prevent flash -->
  <script>
    (function() {
      var savedTheme = localStorage.getItem('arcane-theme-preset') || 'green';
      var savedMode = localStorage.getItem('arcane-theme-mode') || 'dark';
      document.documentElement.className = 'theme-' + savedTheme + '-' + savedMode;
    })();
  </script>

  <!-- Global CSS Reset and Loading Screen -->
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      background-color: #920026;
      color: #f4f7fb;
    }
    body {
      font-family: 'RACInterference', 'SF Mono', monospace;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    /* Loading state */
    .loading-screen {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #920026;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    .loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loader {
      width: 48px;
      height: 48px;
      border: 2px solid rgba(244, 247, 251, 0.18);
      border-top-color: #f4f7fb;
      border-left-color: rgba(244, 247, 251, 0.62);
      border-radius: 14px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Firebase SDKs (uncomment if using Firebase) -->
  <!--
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: ": ",
      authDomain: ": ",
      projectId: ": ",
      storageBucket: ": ",
      messagingSenderId: ": ",
      appId: ": "
    };
    firebase.initializeApp(firebaseConfig);
  </script>
  -->

  <!-- Jaspr generated styles -->
  <link rel="stylesheet" href="styles.css?v=20260306-1">
</head>
<body>
  <!-- Loading screen shown while Dart loads -->
  <div class="loading-screen" id="loading">
    <div class="loader"></div>
  </div>

  <!-- App root -->
  <div id="app"></div>

  <!-- Hide loading screen when app loads -->
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var loading = document.getElementById('loading');
        if (loading) {
          loading.classList.add('hidden');
        }
      }, 100);
    });
  </script>

  <!-- Jaspr compiled Dart -->
  <script defer src="main.client.dart.js?v=20260306-1"></script>
</body>
</html>
